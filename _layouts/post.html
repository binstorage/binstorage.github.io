---
layout: default
---
<article class="post-article">
  <header class="post-article__header">
    <h1 class="page-title">{{ page.title | escape }}</h1>
    <div class="post-article__meta">
      <time class="post-article__date" datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y년 %m월 %d일" }}
      </time>
      {% if page.categories.size > 0 %}
      <div class="post-article__categories">
        {% for cat in page.categories %}
        <span class="skill-tag">{{ cat }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </header>
  <div class="page-content post-article__content">
    {{ content }}
  </div>
  <footer class="post-article__footer">
    <a href="{{ '/blog' | relative_url }}" class="post-article__back">&larr; 목록으로 돌아가기</a>
  </footer>
</article>
